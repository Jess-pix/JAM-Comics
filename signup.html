<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - JAM Comics</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-top">
      <div class="logo">
        <a href="index.html"><h1>JAM Comics</h1></a>
      </div>
      <nav class="business-nav">
        <a href="index.html">Home</a>
        <a href="about.html">About Us</a>
        <a href="join.html">Join Our Team</a>
        <a href="contact.html">Contact/Help</a>
      </nav>
    </div>

    <nav class="story-nav">
      <a href="login.html">Digital Library</a>
      <a href="authors.html">Authors & Artists</a>
      <a href="newsletter.html">Newsletter</a>
      <a href="store.html">Store/Merch</a>
    </nav>
  </header>

  <!-- SIGN UP -->
  <section class="hero auth-container">
    <h1>Create Account</h1>
    <p>Join JAM Comics</p>

    <input type="email" id="email" placeholder="Email"><br><br>
    <input type="password" id="password" placeholder="Password"><br><br>

    <button onclick="signUp()">Sign Up</button>

    <p>Already have an account?
      <a href="login.html">Login</a>
    </p>
  </section>

  <!-- FIREBASE (v8 compatible) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

  <script>
  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyAENhkCJCxbPXr18GHyCW3t1LzIe7s0dZw",
    authDomain: "jam-comics.firebaseapp.com",
    projectId: "jam-comics",
    storageBucket: "jam-comics.firebasestorage.app",
    messagingSenderId: "1023403941384",
    appId: "1:1023403941384:web:67c425faea31d58ed1fbbd",
    measurementId: "G-TKLMVKDPN9"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  // SIGN UP FUNCTION
  function signUp() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    auth.createUserWithEmailAndPassword(email, password)
      .then(() => {
        alert("Account created!");
        window.location.href = "library.html"; // redirect to library
      })
      .catch(error => {
        alert(error.message);
      });
  }
  </script>

</body>
</html>
